<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceGate Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 8V12L15 15" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#00C6FF" />
                                <stop offset="1" stop-color="#0072FF" />
                            </linearGradient>
                            <linearGradient id="paint1_linear" x1="12" y1="8" x2="15" y2="15" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#00C6FF" />
                                <stop offset="1" stop-color="#0072FF" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h2>TraceGate</h2>
                </div>
            </div>
            
            <div class="sidebar-content">
                <h3 class="section-title">SESSIONS</h3>
                <ul id="session-list" class="session-list">
                    <!-- Sessions injected here -->
                    <li class="loading-state">Loading sessions...</li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <h1 id="current-session-title">Select a Session</h1>
                    <span id="current-session-meta" class="session-meta"></span>
                </div>
                <div class="nav-right">
                    <button class="icon-btn" title="Refresh" onclick="loadSessions()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                    </button>
                </div>
            </header>

            <div class="content-scroll">
                <div id="welcome-state" class="analytics-dashboard">
                    <div class="analytics-header">
                        <div class="empty-icon">🛡️</div>
                        <h2>TraceGate Observatory</h2>
                        <p>Select a session from the sidebar to view the agent timeline, or review global analytics below.</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card glass-panel">
                            <h3>Total Sessions</h3>
                            <div class="stat-value" id="stat-sessions">-</div>
                        </div>
                        <div class="stat-card glass-panel">
                            <h3>Total Events</h3>
                            <div class="stat-value" id="stat-events">-</div>
                        </div>
                    </div>
                    
                    <div class="charts-grid">
                        <div class="chart-container glass-panel">
                            <h3>Risk Distribution</h3>
                            <canvas id="riskChart"></canvas>
                        </div>
                        <div class="chart-container glass-panel">
                            <h3>Top Tools Used</h3>
                            <canvas id="toolsChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div id="timeline-filters" class="timeline-filters hidden glass-panel">
                    <div class="filter-group">
                        <label>Risk Level:</label>
                        <select id="filter-risk" onchange="applyFilters()">
                            <option value="all">All</option>
                            <option value="critical">Critical</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Action:</label>
                        <select id="filter-action" onchange="applyFilters()">
                            <option value="all">All</option>
                            <option value="allow">Allow</option>
                            <option value="deny">Deny</option>
                            <option value="ask">Ask</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Tool:</label>
                        <input type="text" id="filter-tool" placeholder="e.g. read_file" onkeyup="applyFilters()">
                    </div>
                </div>

                <div id="timeline-container" class="timeline-container hidden">
                    <!-- Timeline items injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals and Overlays -->
    <div id="json-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Raw Payload</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <pre><code id="modal-json"></code></pre>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
